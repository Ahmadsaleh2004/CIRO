<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="../css/style.css">

<link rel="stylesheet"
href="../css/dark-theme.css"
id="theme-style">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="home.html">

            Cairo Store

        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="home.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="products.html">
                        Products
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="aboutus.html">
                        About Us
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="contactus.html">
                        Contact Us
                    </a>
                </li>

            </ul>

            <div class="d-flex gap-2">

                <a href="wishlist.html"
                   class="btn btn-outline-danger position-relative">

                    ❤️

                    <span id="wishlist-count"
                          class="counter-badge">

                        0

                    </span>

                </a>

                <a href="cart.html"
                   class="btn btn-outline-warning position-relative">

                    🛒

                    <span id="cart-count"
                          class="counter-badge">

                        0

                    </span>

                </a>

                <button id="theme-toggle"
                        class="btn btn-outline-light">

                    🌙

                </button>

            </div>

        </div>

    </div>

</nav>

<section class="container py-5">

<h1 class="text-center mb-5">

Checkout

</h1>

<div class="row">

<div class="col-lg-7">

<div class="card p-4">

<h4 class="mb-4">

Customer Information

</h4>

<form id="checkoutForm">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<input
type="text"
id="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<input
type="email"
id="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Phone

</label>

<input
type="text"
id="phone"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Address

</label>

<textarea
id="address"
class="form-control"
rows="4"
required></textarea>

</div>

<button
class="btn btn-success w-100"
type="submit">

Place Order

</button>

</form>

</div>

</div>

<div class="col-lg-5">

<div class="card p-4">

<h4 class="mb-3">

Order Summary

</h4>

<div id="order-summary">

</div>

</div>

</div>

</div>

</section>

<div id="footer-container"></div>

<script src="../js/main.js"></script>
<script src="../js/checkout.js"></script>

</body>
</html>
